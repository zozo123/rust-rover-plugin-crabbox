name: Build Rust Runner Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "docker/rust-runner/**"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "docker/rust-runner/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/crabbox-rust-runner

jobs:
  build:
    name: Build and publish Rust runner image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=0.3.4,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: docker/rust-runner
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke cargo in image
        if: github.event_name == 'pull_request'
        run: |
          docker build -t crabbox-rust-runner:pr docker/rust-runner
          docker run --rm crabbox-rust-runner:pr cargo --version
          docker run --rm crabbox-rust-runner:pr cargo nextest --version
